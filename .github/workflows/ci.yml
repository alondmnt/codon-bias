name: Build and Test Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check code formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'
          src: "codonbias/ tests/"

      - name: Run linter
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check'
          src: "codonbias/ tests/"

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.8", "3.10", "3.12" ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Built-in caching replaces your custom envhash step
          cache-dependency-path: 'setup.py'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-regressions pytest-xdist
          pip install -e .

      - name: Run tests
        run: pytest -vvvs --durations=0 -n auto

